name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4 # Có thể là v3 hoặc v4 tùy file của bạn
      with:
        gradle-version: 8.7 # Ép hệ thống tự cài đúng bản 8.7 ổn định

    - name: Build APK
      run: gradle assembleDebug # Đổi lại thành chữ gradle như ban đầu



    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
